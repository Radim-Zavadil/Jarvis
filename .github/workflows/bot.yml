name: Telegram Bot

on:
  schedule:
    # Morning briefing — 7:00 AM CET (UTC+1, winter): 06:00 UTC
    - cron: '0 6 * * *'
    # Morning briefing — 7:00 AM CEST (UTC+2, summer): 05:00 UTC
    - cron: '0 5 * * *'
    # F1 session checker — Fri/Sat/Sun only, every 30 min between 05:00–22:00 UTC
    # (covers all F1 session times globally)
    - cron: '*/30 5-22 * * 5,6,0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run (morning or f1_check)'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - f1_check

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            # Check if it's 7:00 AM in Prague (Europe/Prague timezone)
            PRAGUE_HOUR=$(TZ="Europe/Prague" date +'%H')
            PRAGUE_MIN=$(TZ="Europe/Prague" date +'%M')
            if [ "$PRAGUE_HOUR" = "07" ] && [ "$PRAGUE_MIN" = "00" ]; then
              echo "mode=morning" >> "$GITHUB_OUTPUT"
            else
              echo "mode=f1_check" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GOOGLE_CALENDAR_CREDENTIALS: ${{ secrets.GOOGLE_CALENDAR_CREDENTIALS }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python main.py ${{ steps.mode.outputs.mode }}
